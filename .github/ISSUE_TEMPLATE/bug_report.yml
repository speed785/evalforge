name: Bug report
description: Report a reproducible problem in evalforge
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please include enough detail for us to reproduce it quickly.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and expected behavior.
      placeholder: A clear and concise description of the problem.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Provide exact steps, sample input, and commands.
      placeholder: |
        1. Install ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: dropdown
    id: sdk
    attributes:
      label: SDK
      options:
        - Python
        - TypeScript
        - CLI
        - Documentation
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: OS, Python/Node version, evalforge version
    validations:
      required: true
